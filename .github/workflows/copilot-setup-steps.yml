name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".npmrc"
      - ".node-version"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-lockfile-registry.mjs"
      - "scripts/check-tauri-version-alignment.mjs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".npmrc"
      - ".node-version"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-lockfile-registry.mjs"
      - "scripts/check-tauri-version-alignment.mjs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify package registry and integrity
        run: node scripts/check-lockfile-registry.mjs

      - run: npm ci

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-02-13
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Verify Tauri JavaScript and Rust versions align
        run: node scripts/check-tauri-version-alignment.mjs

      - name: Pre-fetch Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked
