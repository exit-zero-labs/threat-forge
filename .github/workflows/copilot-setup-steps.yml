name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".npmrc"
      - ".node-version"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-lockfile-registry.mjs"
      - "scripts/check-tauri-version-alignment.mjs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".npmrc"
      - ".node-version"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-lockfile-registry.mjs"
      - "scripts/check-tauri-version-alignment.mjs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify package registry and integrity
        run: node scripts/check-lockfile-registry.mjs

      - run: npm ci

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master 2026-02-13
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Verify Tauri JavaScript and Rust versions align
        run: node scripts/check-tauri-version-alignment.mjs

      - name: Pre-fetch Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked
