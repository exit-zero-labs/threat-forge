name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"

      - name: Verify package registry and integrity
        run: node scripts/check-lockfile-registry.mjs

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master 2026-02-13
        with:
          toolchain: stable

      - name: Verify Tauri JavaScript and Rust versions align
        run: node scripts/check-tauri-version-alignment.mjs

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          deny-licenses: >-
            AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later,
            GPL-2.0, GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0, GPL-3.0-only, GPL-3.0-or-later,
            LGPL-2.0, LGPL-2.0-only, LGPL-2.0-or-later,
            LGPL-2.1, LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0, LGPL-3.0-only, LGPL-3.0-or-later,
            EUPL-1.1, EUPL-1.2
