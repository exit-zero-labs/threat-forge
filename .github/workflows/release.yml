name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify package registry and integrity
        run: node scripts/check-lockfile-registry.mjs

      - run: npm ci

      - name: Biome lint + format check
        run: npx biome check .

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npx vitest --run

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master 2026-02-13
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify Tauri JavaScript and Rust versions align
        run: node scripts/check-tauri-version-alignment.mjs

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Fetch locked Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked

      - name: Clippy lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --frozen -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --frozen

  release:
    name: Release (${{ matrix.settings.platform }})
    needs: [validate]
    permissions:
      contents: write
    environment:
      name: Production
      url: https://github.com/exit-zero-labs/threat-forge/releases/tag/${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: ubuntu-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.settings.platform }}
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Verify package registry and integrity
        run: node scripts/check-lockfile-registry.mjs

      - run: npm ci

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master 2026-02-13
        with:
          toolchain: stable
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify Tauri JavaScript and Rust versions align
        run: node scripts/check-tauri-version-alignment.mjs

      - name: Fetch locked Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev

      - name: Install Azure Trusted Signing dlib
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageUri = "https://api.nuget.org/v3-flatcontainer/microsoft.trusted.signing.client/1.0.60/microsoft.trusted.signing.client.1.0.60.nupkg"
          $packagePath = Join-Path "${{ runner.temp }}" "Microsoft.Trusted.Signing.Client.1.0.60.zip"
          $extractPath = Join-Path "${{ runner.temp }}" "TrustedSigning"
          # SHA-512 published by the immutable NuGet catalog entry for version 1.0.60.
          $expectedSha512 = "EF6928E067158772540D3222A25734E8F944576CBE48272495D94CE8129B14A0B27FFA7378C0DABA94EEF1F5DC20D04DA30EC1AF3FB63F73ED5FB7212BEA57C4"

          Invoke-WebRequest -Uri $packageUri -OutFile $packagePath
          $actualSha512 = (Get-FileHash -LiteralPath $packagePath -Algorithm SHA512).Hash
          if ($actualSha512 -ne $expectedSha512) {
            throw "Microsoft.Trusted.Signing.Client package hash mismatch"
          }

          Expand-Archive -LiteralPath $packagePath -DestinationPath $extractPath
          $dlib = Join-Path $extractPath "bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path -LiteralPath $dlib -PathType Leaf)) {
            throw "Azure.CodeSigning.Dlib.dll missing from verified package"
          }
          echo "DLIB_PATH=$dlib" >> $env:GITHUB_ENV

      - uses: tauri-apps/tauri-action@f650639e43adf15f35dd1023d248b3ecc3568b64 # action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Azure Trusted Signing (Windows)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # macOS code signing — tauri-action skips signing when these are empty.
          # To enable: add Apple Developer secrets in GitHub repo settings.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: "ThreatForge v__VERSION__"
          releaseBody: "See the assets to download this version and install ThreatForge."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.settings.args }} ${{ runner.os == 'Windows' && '--config src-tauri/tauri.signing.conf.json' || '' }} -- --frozen
