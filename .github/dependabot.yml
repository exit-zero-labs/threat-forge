version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - maintenance
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: America/New_York
    labels:
      - dependencies
      - maintenance
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/New_York
    labels:
      - dependencies
      - maintenance
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10
